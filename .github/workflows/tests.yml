on:
  pull_request_review:
    types: [submitted]
  push:
  workflow_dispatch:

name: Tests

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt -y update; sudo apt -y install tshark libgcrypt-dev libglib2.0-dev
      - name: Build
        run: cmake . && make
      - name: Tshark test (TLS 1.2)
        # Requires sudo because of traffic capture
        run: sudo ./tests/test_tshark.sh
      - name: Curl test (TLS 1.2)
        run: sudo ./tests/test_curl.sh
      - name: Tshark test (TLS 1.3)
        run: sudo ./tests/test_tshark_tls13.sh
      - name: Curl test (TLS 1.3)
        run: sudo ./tests/test_curl_tls13.sh