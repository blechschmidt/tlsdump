on:
  pull_request_review:
    types: [submitted]
  push:
  workflow_dispatch:

name: Tests

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          # Install newer tshark from Wireshark PPA (Ubuntu 24.04 ships 4.2.2 which
          # cannot decrypt TLS 1.3 with only traffic secrets).
          sudo add-apt-repository -y ppa:wireshark-dev/stable
          sudo apt -y update
          sudo apt -y install tshark libgcrypt-dev libglib2.0-dev libcurl4-openssl-dev
      - name: Build
        run: cmake . && make
      - name: Run tests
        run: |
          failed=0
          for test in tests/test_tshark.sh tests/test_curl.sh tests/test_tshark_tls13.sh tests/test_curl_tls13.sh tests/test_fork.sh tests/test_thread.sh; do
            echo "=== Running $test ==="
            if sudo ./"$test"; then
              echo "=== PASSED: $test ==="
            else
              echo "=== FAILED: $test ==="
              failed=$((failed + 1))
            fi
          done
          echo "=== $failed test(s) failed ==="
          exit $failed